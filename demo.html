<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TICKLASS | デモ画面</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0d0f;--bg2:#141418;--bg3:#1c1c22;--bg4:#222228;
  --accent:#6c63ff;--accent2:#a78bfa;--accent-glow:rgba(108,99,255,0.2);
  --green:#10b981;--amber:#f59e0b;--red:#ef4444;
  --white:#ffffff;--text:#e8e8f0;--muted:#7a7a90;
  --border:rgba(255,255,255,0.07);--border2:rgba(108,99,255,0.25);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* LAYOUT */
.app{display:grid;grid-template-columns:220px 1fr;min-height:100vh;}

/* SIDEBAR */
.sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:24px 0;display:flex;flex-direction:column;}
.sidebar-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:var(--white);padding:0 20px 24px;border-bottom:1px solid var(--border);}
.sidebar-logo span{color:var(--accent2);}
.sidebar-demo-badge{margin:12px 16px 0;background:rgba(108,99,255,0.12);border:1px solid var(--border2);border-radius:4px;padding:6px 10px;font-size:10px;color:var(--accent2);letter-spacing:0.1em;text-align:center;}
.sidebar-nav{padding:16px 12px;flex:1;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:6px;font-size:13px;color:var(--muted);cursor:pointer;transition:all 0.15s;margin-bottom:2px;}
.nav-item:hover{background:var(--bg3);color:var(--text);}
.nav-item.active{background:rgba(108,99,255,0.12);color:var(--accent2);}
.nav-icon{font-size:15px;width:20px;text-align:center;}
.sidebar-bottom{padding:16px 12px;border-top:1px solid var(--border);}
.sidebar-user{display:flex;align-items:center;gap:10px;padding:10px 12px;}
.user-avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--white);}
.user-name{font-size:12px;color:var(--text);}
.user-role{font-size:10px;color:var(--muted);}

/* MAIN */
.main{display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;justify-content:space-between;align-items:center;}
.topbar-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--white);}
.topbar-actions{display:flex;gap:10px;align-items:center;}
.search-box{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 14px;font-size:13px;color:var(--text);font-family:'Noto Sans JP',sans-serif;outline:none;width:200px;transition:border 0.2s;}
.search-box::placeholder{color:var(--muted);}
.search-box:focus{border-color:var(--border2);}
.btn{padding:9px 18px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;font-family:'Noto Sans JP',sans-serif;border:none;}
.btn-accent{background:var(--accent);color:var(--white);}
.btn-accent:hover{background:var(--accent2);}
.btn-outline{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-outline:hover{border-color:var(--border2);color:var(--text);}

/* CONTENT */
.content{padding:24px 28px;overflow-y:auto;flex:1;}

/* STAT CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px;}
.stat-card-label{font-size:11px;color:var(--muted);letter-spacing:0.06em;margin-bottom:8px;}
.stat-card-num{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:var(--white);line-height:1;}
.stat-card-sub{font-size:11px;color:var(--muted);margin-top:6px;}
.stat-card-sub.green{color:var(--green);}
.stat-card-sub.amber{color:var(--amber);}
.stat-card-sub.red{color:var(--red);}

/* FILTER BAR */
.filter-bar{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;align-items:center;}
.filter-btn{padding:6px 14px;border-radius:100px;font-size:12px;cursor:pointer;transition:all 0.15s;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Noto Sans JP',sans-serif;}
.filter-btn.active{background:var(--accent);color:var(--white);border-color:var(--accent);}
.filter-btn:hover:not(.active){border-color:var(--border2);color:var(--text);}
.filter-label{font-size:11px;color:var(--muted);margin-right:4px;}

/* TABLE */
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.table-header{display:grid;grid-template-columns:2fr 1.2fr 1fr 1.5fr 1fr;padding:12px 20px;border-bottom:1px solid var(--border);font-size:11px;color:var(--muted);letter-spacing:0.06em;}
.member-row{display:grid;grid-template-columns:2fr 1.2fr 1fr 1.5fr 1fr;padding:14px 20px;border-bottom:1px solid var(--border);align-items:center;transition:background 0.15s;}
.member-row:last-child{border-bottom:none;}
.member-row:hover{background:var(--bg3);}
.member-info{display:flex;align-items:center;gap:12px;}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--white);flex-shrink:0;}
.member-name{font-size:14px;color:var(--white);font-weight:500;}
.member-id{font-size:10px;color:var(--muted);margin-top:2px;}
.genre-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:4px;font-size:11px;font-weight:500;}
.ticket-display{display:flex;align-items:center;gap:6px;}
.tick-dots{display:flex;gap:3px;}
.tick-dot{width:7px;height:7px;border-radius:1px;}
.tick-dot.on{background:var(--accent2);}
.tick-dot.off{background:var(--border);}
.tick-count{font-size:13px;font-weight:500;min-width:32px;}
.ticket-actions{display:flex;gap:6px;}
.tick-btn{width:28px;height:28px;border-radius:5px;border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;font-weight:700;}
.tick-btn.use{background:rgba(239,68,68,0.12);color:var(--red);}
.tick-btn.use:hover{background:rgba(239,68,68,0.25);}
.tick-btn.add{background:rgba(16,185,129,0.12);color:var(--green);}
.tick-btn.add:hover{background:rgba(16,185,129,0.25);}
.tick-btn:disabled{opacity:0.3;cursor:not-allowed;}
.status-badge{padding:4px 10px;border-radius:4px;font-size:11px;font-weight:500;}
.status-ok{background:rgba(16,185,129,0.1);color:var(--green);}
.status-warn{background:rgba(245,158,11,0.1);color:var(--amber);}
.status-danger{background:rgba(239,68,68,0.1);color:var(--red);}

/* ALERT BANNER */
.alert-banner{background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2);border-radius:8px;padding:12px 18px;margin-bottom:18px;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--amber);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.modal-overlay.show{opacity:1;pointer-events:all;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:32px;width:400px;transform:translateY(10px);transition:transform 0.2s;}
.modal-overlay.show .modal{transform:translateY(0);}
.modal-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--white);margin-bottom:6px;}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:24px;}
.modal-input{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:12px 16px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;outline:none;width:100%;transition:border 0.2s;margin-bottom:16px;}
.modal-input:focus{border-color:var(--border2);}
.modal-input select{background:var(--bg3);}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px 20px;font-size:13px;color:var(--text);z-index:300;transform:translateY(10px);opacity:0;transition:all 0.3s;display:flex;align-items:center;gap:10px;max-width:300px;}
.toast.show{transform:translateY(0);opacity:1;}
.toast-icon{font-size:16px;}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-icon{font-size:40px;margin-bottom:12px;}

@media(max-width:768px){
  .app{grid-template-columns:1fr;}
  .sidebar{display:none;}
  .stat-grid{grid-template-columns:1fr 1fr;}
  .table-header{display:none;}
  .member-row{grid-template-columns:1fr;gap:10px;padding:16px;}
}
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">TICK<span>LASS</span></div>
    <div class="sidebar-demo-badge">DEMO MODE</div>
    <nav class="sidebar-nav">
      <div class="nav-item active"><span class="nav-icon">👥</span>会員管理</div>
      <div class="nav-item"><span class="nav-icon">🎟️</span>チケット一覧</div>
      <div class="nav-item"><span class="nav-icon">📊</span>レポート</div>
      <div class="nav-item"><span class="nav-icon">🔔</span>アラート<span style="margin-left:auto;background:var(--amber);color:#000;font-size:10px;padding:1px 7px;border-radius:10px;" id="alert-count">0</span></div>
      <div class="nav-item"><span class="nav-icon">⚙️</span>設定</div>
    </nav>
    <div class="sidebar-bottom">
      <div class="sidebar-user">
        <div class="user-avatar">管</div>
        <div><div class="user-name">管理者</div><div class="user-role">Administrator</div></div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title">会員管理</div>
      <div class="topbar-actions">
        <input class="search-box" type="text" placeholder="名前で検索..." id="search-input" oninput="renderTable()">
        <button class="btn btn-accent" onclick="openAddModal()">＋ 会員追加</button>
      </div>
    </div>

    <div class="content">
      <!-- STATS -->
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-card-label">総会員数</div>
          <div class="stat-card-num" id="stat-total">0</div>
          <div class="stat-card-sub green" id="stat-active"></div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">残チケット合計</div>
          <div class="stat-card-num" id="stat-tickets">0</div>
          <div class="stat-card-sub">全会員分</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">今月の使用数</div>
          <div class="stat-card-num" id="stat-used">0</div>
          <div class="stat-card-sub green">レッスン回数</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">残少アラート</div>
          <div class="stat-card-num" id="stat-alert" style="color:var(--amber)">0</div>
          <div class="stat-card-sub amber">残2枚以下</div>
        </div>
      </div>

      <!-- ALERT BANNER -->
      <div class="alert-banner" id="alert-banner" style="display:none;">
        ⚠️ <span id="alert-text"></span>
      </div>

      <!-- FILTER -->
      <div class="filter-bar">
        <span class="filter-label">ジャンル：</span>
        <button class="filter-btn active" onclick="setFilter('all',this)">すべて</button>
        <button class="filter-btn" onclick="setFilter('ゴルフ',this)">⛳ ゴルフ</button>
        <button class="filter-btn" onclick="setFilter('テニス',this)">🎾 テニス</button>
        <button class="filter-btn" onclick="setFilter('水泳',this)">🏊 水泳</button>
        <button class="filter-btn" onclick="setFilter('ピアノ',this)">🎹 ピアノ</button>
        <button class="filter-btn" onclick="setFilter('英会話',this)">🗣️ 英会話</button>
        <button class="filter-btn" onclick="setFilter('料理',this)">🍳 料理</button>
        <button class="filter-btn" onclick="setFilter('フィットネス',this)">💪 フィットネス</button>
      </div>

      <!-- TABLE -->
      <div class="table-wrap">
        <div class="table-header">
          <div>会員</div>
          <div>ジャンル</div>
          <div>残チケット</div>
          <div>チケット操作</div>
          <div>状態</div>
        </div>
        <div id="member-list"></div>
      </div>
    </div>
  </div>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-title">会員を追加</div>
    <div class="modal-sub">新しい受講者を登録します</div>
    <input class="modal-input" type="text" id="add-name" placeholder="お名前">
    <select class="modal-input" id="add-genre">
      <option value="ゴルフ">⛳ ゴルフ</option>
      <option value="テニス">🎾 テニス</option>
      <option value="水泳">🏊 水泳</option>
      <option value="ピアノ">🎹 ピアノ</option>
      <option value="英会話">🗣️ 英会話</option>
      <option value="料理">🍳 料理</option>
      <option value="フィットネス">💪 フィットネス</option>
    </select>
    <input class="modal-input" type="number" id="add-tickets" placeholder="初期チケット枚数" min="1" max="30" value="10">
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-accent" onclick="addMember()">追加する</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <span class="toast-icon" id="toast-icon">✓</span>
  <span id="toast-msg"></span>
</div>

<script>
const GENRE_COLORS = {
  'ゴルフ':      '#6c63ff',
  'テニス':      '#10b981',
  '水泳':        '#3b82f6',
  'ピアノ':      '#ec4899',
  '英会話':      '#f59e0b',
  '料理':        '#ef4444',
  'フィットネス':'#8b5cf6',
};
const GENRE_ICONS = {
  'ゴルフ':'⛳','テニス':'🎾','水泳':'🏊','ピアノ':'🎹',
  '英会話':'🗣️','料理':'🍳','フィットネス':'💪',
};

let members = [
  {id:1,name:'田中 太郎',  genre:'ゴルフ',      tickets:8,  used:4},
  {id:2,name:'佐藤 花子',  genre:'ピアノ',      tickets:2,  used:8},
  {id:3,name:'鈴木 一郎',  genre:'テニス',      tickets:1,  used:9},
  {id:4,name:'山田 次郎',  genre:'英会話',      tickets:10, used:0},
  {id:5,name:'中村 美咲',  genre:'料理',        tickets:3,  used:7},
  {id:6,name:'小林 健二',  genre:'フィットネス', tickets:5,  used:5},
  {id:7,name:'加藤 直子',  genre:'水泳',        tickets:0,  used:10},
  {id:8,name:'伊藤 誠',    genre:'ゴルフ',      tickets:6,  used:4},
  {id:9,name:'渡辺 夕子',  genre:'テニス',      tickets:4,  used:6},
  {id:10,name:'松本 健太', genre:'ピアノ',      tickets:7,  used:3},
];
let nextId = 11;
let usedToday = 12;
let currentFilter = 'all';

function getStatus(t){
  if(t===0) return {label:'要更新',cls:'status-danger'};
  if(t<=2)  return {label:'残少',  cls:'status-warn'};
  return           {label:'正常',  cls:'status-ok'};
}

function initials(name){ return name.charAt(0); }

function renderDots(tickets){
  const max = Math.min(Math.max(tickets,0)+3, 10);
  let html = '';
  for(let i=0;i<max;i++){
    html += `<div class="tick-dot ${i<tickets?'on':'off'}"></div>`;
  }
  return html;
}

function setFilter(f, el){
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderTable();
}

function renderTable(){
  const query = document.getElementById('search-input').value.trim().toLowerCase();
  let filtered = members.filter(m=>{
    const matchFilter = currentFilter==='all' || m.genre===currentFilter;
    const matchSearch = !query || m.name.toLowerCase().includes(query);
    return matchFilter && matchSearch;
  });

  const list = document.getElementById('member-list');
  if(filtered.length===0){
    list.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div>該当する会員が見つかりません</div>`;
    updateStats(); return;
  }

  list.innerHTML = filtered.map(m=>{
    const st = getStatus(m.tickets);
    const color = GENRE_COLORS[m.genre]||'#6c63ff';
    const icon  = GENRE_ICONS[m.genre]||'📚';
    const countColor = m.tickets===0?'var(--red)':m.tickets<=2?'var(--amber)':'var(--accent2)';
    return `
    <div class="member-row" id="row-${m.id}">
      <div class="member-info">
        <div class="avatar" style="background:${color}">${initials(m.name)}</div>
        <div>
          <div class="member-name">${m.name}</div>
          <div class="member-id">ID-${String(m.id).padStart(3,'0')}</div>
        </div>
      </div>
      <div>
        <span class="genre-badge" style="background:${color}22;color:${color}">
          ${icon} ${m.genre}
        </span>
      </div>
      <div class="ticket-display">
        <div class="tick-dots">${renderDots(m.tickets)}</div>
      </div>
      <div class="ticket-actions">
        <button class="tick-btn use" onclick="useTicket(${m.id})" ${m.tickets===0?'disabled':''} title="1枚使用">－</button>
        <span style="font-size:15px;font-weight:700;color:${countColor};min-width:28px;text-align:center;">${m.tickets}</span>
        <button class="tick-btn add" onclick="addTicket(${m.id})" title="10枚追加">＋</button>
      </div>
      <div><span class="status-badge ${st.cls}">${st.label}</span></div>
    </div>`;
  }).join('');

  updateStats();
}

function useTicket(id){
  const m = members.find(x=>x.id===id);
  if(!m||m.tickets===0) return;
  m.tickets--;
  m.used++;
  usedToday++;
  renderTable();
  showToast(`${m.name} のチケットを1枚使用しました`, m.tickets<=2?'⚠️':'✓', m.tickets<=2);
}

function addTicket(id){
  const m = members.find(x=>x.id===id);
  if(!m) return;
  m.tickets += 10;
  renderTable();
  showToast(`${m.name} にチケットを10枚追加しました`, '✓', false);
}

function updateStats(){
  const total   = members.length;
  const tickets = members.reduce((s,m)=>s+m.tickets,0);
  const alerts  = members.filter(m=>m.tickets<=2).length;
  const used    = members.reduce((s,m)=>s+m.used,0);

  document.getElementById('stat-total').textContent   = total;
  document.getElementById('stat-tickets').textContent = tickets;
  document.getElementById('stat-used').textContent    = used;
  document.getElementById('stat-alert').textContent   = alerts;
  document.getElementById('alert-count').textContent  = alerts;
  document.getElementById('stat-active').textContent  = `アクティブ ${members.filter(m=>m.tickets>0).length}名`;

  const banner = document.getElementById('alert-banner');
  const alertMembers = members.filter(m=>m.tickets<=2).map(m=>m.name);
  if(alertMembers.length>0){
    banner.style.display='flex';
    document.getElementById('alert-text').textContent =
      `チケット残少の会員: ${alertMembers.join('、')} — 購入を促してください`;
  } else {
    banner.style.display='none';
  }
}

function openAddModal(){
  document.getElementById('add-modal').classList.add('show');
  document.getElementById('add-name').focus();
}
function closeModal(){
  document.getElementById('add-modal').classList.remove('show');
}
function addMember(){
  const name    = document.getElementById('add-name').value.trim();
  const genre   = document.getElementById('add-genre').value;
  const tickets = parseInt(document.getElementById('add-tickets').value)||10;
  if(!name){ document.getElementById('add-name').focus(); return; }
  members.unshift({id:nextId++,name,genre,tickets,used:0});
  closeModal();
  document.getElementById('add-name').value='';
  document.getElementById('add-tickets').value='10';
  renderTable();
  showToast(`${name} を追加しました`,'✓',false);
}

let toastTimer;
function showToast(msg, icon='✓', isWarn=false){
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent  = msg;
  document.getElementById('toast-icon').textContent = icon;
  t.style.borderColor = isWarn?'rgba(245,158,11,0.3)':'rgba(108,99,255,0.3)';
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'),2800);
}

document.getElementById('add-modal').addEventListener('click',function(e){
  if(e.target===this) closeModal();
});

renderTable();
